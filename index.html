    <!-- Light theme: paint the page background light from the very first frame
         so there's no dark flash or dark mobile-overscroll edges before the CSS
         loads. The dark into-the-eye intro is a fixed overlay drawn on top. -->
    <style>
      html[data-theme='light'] body { background-color: #ffffff; }
    </style>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
