<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Single Page App redirect for GitHub Pages
      // Stores the path and redirects to the base, where React Router picks it up
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
